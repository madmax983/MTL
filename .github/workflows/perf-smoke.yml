name: perf-smoke
on:
  push:
    branches: [perf-bench]
  pull_request:
    paths:
      - 'crates/mtl-perf/**'
      - '.github/workflows/perf-smoke.yml'
permissions:
  contents: read
jobs:
  compile-benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile benches (no run)
        run: cargo bench -p mtl-perf --no-run
